name: Deploy to EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Connect to EKS cluster
        run: |
          aws eks update-kubeconfig --region us-east-1 --name routbox-dev

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/

      - name: Verify pods
        run: |
          kubectl rollout status deployment/shipments-api --timeout=120s
          kubectl get pods -l app=shipments-api
